name: CI

on:
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch flow policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "${BASE_REF}" = "development" ]; then
            case "${HEAD_REF}" in
              feature/*|feat/*|bugfix/*|fix/*|hotfix/*|chore/*)
                ;;
              *)
                echo "PRs to development must come from feature/*, feat/*, bugfix/*, fix/*, hotfix/*, or chore/* branches."
                echo "Current head branch: ${HEAD_REF}"
                exit 1
                ;;
            esac
          elif [ "${BASE_REF}" = "main" ]; then
            case "${HEAD_REF}" in
              development)
                ;;
              *)
                echo "PRs to main must come from the development branch."
                echo "Current head branch: ${HEAD_REF}"
                exit 1
                ;;
            esac
          else
            echo "Unsupported base branch: ${BASE_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build
