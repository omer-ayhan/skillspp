name: Commitlint

on:
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Skip commitlint for automation PRs to main
        if: github.base_ref == 'main' && (github.head_ref == 'development' || startsWith(github.head_ref, 'release-please--'))
        run: echo "Skipping commitlint for development/release-please automation PRs to main."

      - name: Lint commit messages
        if: github.base_ref != 'main' || (github.head_ref != 'development' && !startsWith(github.head_ref, 'release-please--'))
        run: |
          pnpm exec commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose
